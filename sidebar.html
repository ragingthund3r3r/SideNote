<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SideNote</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 16px;
      margin: 0;
      background: #1e1e1e;
      color: #dadada;
      min-height: 100vh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    h1 {
      font-size: 18px;
      margin-top: 0;
      color: #dadada;
    }
    p {
      color: #b3b3b3;
      font-size: 14px;
    }
    button {
      border: 1px solid #3e3e3e;
      background: #2a2a2a;
      color: #f2f2f2;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover {
      background: #343434;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #9fd59f;
    }
    .bottom-bar {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 14px;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <button id="authorizeFsBtn" type="button">Choose folder</button>
    <button id="placeholderBtn" type="button">Settings</button>
  </div>
  <h1>📝 SideNote</h1>


  <p>File Title here</p>
  <p>File Body here</p>

  <div class="bottom-bar">
    <button id="confirmBtn" type="button">Create</button>

    <div id="fsStatus" class="status"></div>

    <button id="cancelBtn" type="button">Cancel</button>
  </div>
  <script src="sidebar.js"></script>
</body>
</html>
