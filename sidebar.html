<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SideNote</title>
  <style>
    :root {
      --bg-color: #1e1e1e;
      --panel-bg: #181818;
      --hover-bg: #2a2a2a;
      --text-color: #dadada;
      --accent-color: #4a9eff;
      --border-color: #3e3e3e;
      --input-bg: #2a2a2a;
      --section-bg: #242424;
      --text-muted: #b3b3b3;
    }

    body.light-theme {
      --bg-color: #f4f4f4;
      --panel-bg: #ffffff;
      --hover-bg: #e8e8e8;
      --text-color: #333333;
      --accent-color: #0066cc;
      --border-color: #dddddd;
      --input-bg: #ffffff;
      --section-bg: #f9f9f9;
      --text-muted: #666666;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Helvetica, Arial, sans-serif;
      margin: 0;
      background: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      transition: background 0.3s, color 0.3s;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      background: var(--panel-bg);
      margin-bottom: 14px;
    }

    .header-left, .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-color);
    }

    .theme-toggle {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .theme-toggle:hover {
      background: var(--hover-bg);
    }

    .content-container {
      padding: 0 16px 16px 16px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    h1, h2 {
      color: var(--text-color);
    }

    p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    .form-group-textarea {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
      height: 50vh;
    }

    input, textarea {
      border: 1px solid var(--border-color);
      background: var(--input-bg);
      color: var(--text-color);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      outline: none;
      transition: background 0.3s, border-color 0.3s, color 0.3s;
    }

    input:focus, textarea:focus {
      border-color: var(--accent-color);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      height: 100%;
      font-family: inherit;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    textarea::-webkit-scrollbar {
      display: none;
    }

    .meta-section {
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: var(--section-bg);
      padding: 10px;
      margin-bottom: 12px;
      transition: background 0.3s, border-color 0.3s;
    }

    .meta-section-title {
      margin: 0 0 8px 0;
      font-size: 14px;
      color: var(--text-color);
      cursor: pointer;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 20px minmax(0, 1fr) minmax(0, 3fr);
      gap: 8px;
      align-items: center;
    }

    .meta-header {
      color: var(--text-muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .meta-row {
      margin-bottom: 8px;
    }

    .checkbox-wrap {
      display: flex;
      justify-content: center;
    }

    .meta-key-readonly {
      opacity: 0.85;
      color: var(--text-color);
    }

    button {
      border: 1px solid var(--border-color);
      background: var(--input-bg);
      color: var(--text-color);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover {
      background: var(--hover-bg);
    }

    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #757575;
    }

    .bottom-bar {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 14px;
    }

    .hiddenHover {
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.2s ease;
      color: var(--text-muted);
      font-size: 12px;
    }

    .form-group:hover .hiddenHover {
      visibility: visible;
      opacity: 1;
    }

    html, body {
      height: 100%;
      margin: 0;
      scrollbar-gutter: stable;
      overflow-y: auto;
      scrollbar-width: none;
    }

    html::-webkit-scrollbar, body::-webkit-scrollbar {
      width: 0;
      height: 0;
    }
    
    .buttonGroup {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 8px; 
      align-items: center;
      margin-bottom: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
    }

    .buttonGroup::-webkit-scrollbar {
      display: none;
    }

    .editorButton {
      flex: 0 0 auto; 
    }

    .svgButtons {
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .svgButtons svg {
      stroke: var(--accent-color);
    }

    .note {
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: var(--input-bg);
      transition: background 0.3s, border-color 0.3s;
    }

    .note h3 {
      margin: 0 0 6px 0;
      font-size: 16px;
      color: var(--text-color);
    }

    .note p {
      margin: 0;
      white-space: pre-wrap; 
      color: var(--text-color);
    }

    .pastNotesHolder {
      margin-top: 15px;
    }

    .past-notes {
      height: 350px;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .past-notes::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <button class="svgButtons" title="Choose Folder" id="authorizeFsBtn" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-folder-cog"><path d="M10.3 20H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.98a2 2 0 0 1 1.69.9l.66 1.2A2 2 0 0 0 12 6h8a2 2 0 0 1 2 2v3.3"/><path d="m14.305 19.53.923-.382"/><path d="m15.228 16.852-.923-.383"/><path d="m16.852 15.228-.383-.923"/><path d="m16.852 20.772-.383.924"/><path d="m19.148 15.228.383-.923"/><path d="m19.53 21.696-.382-.924"/><path d="m20.772 16.852.924-.383"/><path d="m20.772 19.148.924.383"/><circle cx="18" cy="18" r="3"/></svg>
      </button>
      <h1>SideNote</h1>
    </div>
    <div class="header-right">
      <button id="themeToggle" class="theme-toggle">Light</button>
      <button class="svgButtons" title="Settings" id="placeholderBtn" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-settings"><path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </header>

  <div class="content-container">
  <div class="form-group">
    <input id="fileTitleInput" type="text" placeholder="Enter file title" />
    <span class="hiddenHover" >Preview: <span class="status" id="finalFileName"></span> </span>
  </div>

  <details>
    <summary id="metadata-title" class="meta-section-title">Metadata</summary>
    <section class="meta-section" aria-labelledby="metadata-title">
      <div class="meta-grid meta-header">
        <div></div>
        <div>Field</div>
        <div>Value</div>
      </div>
      <div id="sidebarMetadataRows"></div>
    </section>
  </details>

  <div class="buttonGroup">
    <button class="svgButtons" id="captureSnapshotBtn" title="Snapshot" class="editorButton" type="button">
      <svg style="padding:2px" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3ab2fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-focus-icon lucide-focus"><circle cx="12" cy="12" r="3"/><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/></svg>
    </button>
    <button class="svgButtons" id="captureTimeStampBtn" title="Timestamp" class="editorButton" type="button">
      <svg style="padding:2px" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3ab2fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-clock-icon lucide-clock"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    </button>
    <button class="svgButtons" id="captureAllTabsInWindowBtn" title="All Tabs" class="editorButton" type="button">
      <svg style="padding:2px" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3ab2fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-gallery-vertical-end-icon lucide-gallery-vertical-end"><path d="M7 2h10"/><path d="M5 6h14"/><rect width="18" height="12" x="3" y="10" rx="2"/></svg>
    </button>
    <button class="svgButtons" id="captureThisTabBtn" title="This Tabs" class="editorButton" type="button">
      <svg style="padding:2px" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3ab2fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-app-window-icon lucide-app-window"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M10 4v4"/><path d="M2 8h20"/><path d="M6 4v4"/></svg>
    </button>
    <button class="svgButtons" id="retrivePastTenNotes" title="Retrive Notes" class="editorButton" type="button">
      <svg style="padding:2px" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3ab2fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-history-icon lucide-history"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
    </button>
    <button class="svgButtons" id="compressAllTabsInWidow" title="Compress Tabs" class="editorButton" type="button">
      <svg style="padding:2px" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3ab2fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-layers-icon lucide-layers"><path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83z"/><path d="M2 12a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 12"/><path d="M2 17a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 17"/></svg>
    </button>
    <button class="svgButtons" id="openFileExplorer" title="Open File Explorer" class="editorButton" type="button">
      <svg style="padding:2px" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3ab2fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-folder-closed-icon lucide-folder-closed"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/><path d="M2 10h20"/></svg>
    </button>
  </div>

  <div class="form-group-textarea">
    <textarea id="fileBodyInput" placeholder="Enter file content"></textarea>
  </div>

  <div>
    <input type="checkbox" id="prefixValidity" checked></input>
    <span class="status" >Add prefix to note</span>

  </div>
  <div class="bottom-bar">
    <button id="confirmBtn" type="button">Create</button>

    <div id="fsStatus" class="status"></div>

    <button id="cancelBtn" type="button">Cancel</button>
  </div>

  <details class="pastNotesHolder">
    <summary id="pastnotes-summary" class="meta-section-title">Past-Notes</summary>
    <div id="pastNotes" class="past-notes">
  
    </div>
  </details>
  </div>
  <script src="date-fns.umd.min.js"></script>
  <script src="sidebar.js"></script>
</body>
</html>
