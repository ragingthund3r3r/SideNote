<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SideNote</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 16px;
      margin: 0;
      background: #1e1e1e;
      color: #dadada;
      min-height: 100vh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    h1 {
      font-size: 18px;
      margin-top: 0;
      color: #dadada;
    }
    p {
      color: #b3b3b3;
      font-size: 14px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }
    .form-group-textarea {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
      height: 50vh;
    }

    input,
    textarea {
      border: 1px solid #3e3e3e;
      background: #2a2a2a;
      color: #f2f2f2;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      outline: none;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
      height: 100%;
    }
    textarea {
      overflow-y: scroll;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    textarea::-webkit-scrollbar {
      display: none;
    }
    input:focus,
    textarea:focus {
      border-color: #5f9cff;
    }
    .meta-section {
      border: 1px solid #3e3e3e;
      border-radius: 8px;
      background: #242424;
      padding: 10px;
      margin-bottom: 12px;
    }
    .meta-section-title {
      margin: 0 0 8px 0;
      font-size: 14px;
      color: #e5e5e5;
    }
    .meta-grid {
      display: grid;
      grid-template-columns: 20px minmax(0, 1fr) minmax(0, 3fr);
      gap: 8px;
      align-items: center;
    }
    .meta-header {
      color: #b3b3b3;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .meta-row {
      margin-bottom: 8px;
    }
    .checkbox-wrap {
      display: flex;
      justify-content: center;
    }
    .meta-key-readonly {
      opacity: 0.85;
    }
    button {
      border: 1px solid #3e3e3e;
      background: #2a2a2a;
      color: #f2f2f2;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover {
      background: #343434;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #757575;
    }
    .bottom-bar {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 14px;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <button id="authorizeFsBtn" type="button">Choose folder</button>
    <button id="placeholderBtn" type="button">Settings</button>
  </div>
  <h1>📝 SideNote</h1>
  <div class="form-group">
    <input id="fileTitleInput" type="text" placeholder="Enter file title" />
  </div>

  <details>
    <summary id="metadata-title" class="meta-section-title">Metadata</summary>
    <section class="meta-section" aria-labelledby="metadata-title">
      <div class="meta-grid meta-header">
        <div></div>
        <div>Field</div>
        <div>Value</div>
      </div>
      <div id="sidebarMetadataRows"></div>
    </section>
  </details>


  <div class="form-group-textarea">
    <textarea id="fileBodyInput" placeholder="Enter file content"></textarea>
  </div>

  <div>
    <input type="checkbox" id="prefixValidity" checked></input>
    <span class="status" >Add prefix to note</span>

  </div>
  <div class="bottom-bar">
    <button id="confirmBtn" type="button">Create</button>

    <div id="fsStatus" class="status"></div>

    <button id="cancelBtn" type="button">Cancel</button>
  </div>
  <script src="date-fns.umd.min.js"></script>
  <script src="sidebar.js"></script>
</body>
</html>
