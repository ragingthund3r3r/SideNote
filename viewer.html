<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SideNote - Explorer</title>
  <style>
    :root {
      --bg-color: #1e1e1e;
      --panel-bg: #181818;
      --hover-bg: #2a2a2a;
      --text-color: #dadada;
      --accent-color: #4a9eff;
      --border-color: #333;
      --input-bg: #2a2a2a;
    }

    body.light-theme {
      --bg-color: #f4f4f4;
      --panel-bg: #ffffff;
      --hover-bg: #e8e8e8;
      --text-color: #333333;
      --accent-color: #0066cc;
      --border-color: #ddd;
      --input-bg: #ffffff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Helvetica, Arial, sans-serif;
      margin: 0;
      background: var(--bg-color);
      color: var(--text-color);
      height: 100vh;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      transition: background 0.3s, color 0.3s;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border-color);
      background: var(--panel-bg);
    }
    
    header h1 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 600;
    }

    .theme-toggle {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .theme-toggle:hover {
      background: var(--hover-bg);
    }

    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .left {
      width: 280px;
      background-color: var(--panel-bg);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
    }

    .right {
      flex: 1;
      background-color: var(--bg-color);
      padding: 30px 40px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .left h3 {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-color);
      opacity: 0.7;
      padding: 15px 20px 10px;
      margin: 0;
    }

    .filelist {
      flex: 1;
      overflow-y: auto;
      padding: 0 10px 10px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    
    .filelist::-webkit-scrollbar {
      display: none;
    }

    .file-item {
      padding: 8px 12px;
      margin-bottom: 4px;
      background: transparent;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-item:hover, .file-item.active {
      background: var(--hover-bg);
      color: var(--accent-color);
    }

    #noteHolder .noteTitle {
      font-size: 2rem;
      margin-top: 0;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px;
    }

    #noteHolder .noteBody {
      border: 1px solid var(--border-color);
      background: var(--input-bg);
      color: var(--text-color);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      outline: none;
      transition: background 0.3s, border-color 0.3s, color 0.3s;
      resize: vertical;
      font-family: inherit;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    #noteHolder .noteBody:focus {
      border-color: var(--accent-color);
    }

    #noteHolder .noteBody::-webkit-scrollbar {
      display: none;
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-color);
      opacity: 0.5;
      font-style: italic;
    }

    .renderedHtmlClass {

      overflow-y: auto;

      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .renderedHtmlClass::-webkit-scrollbar {
      display: none;
    }
    
  </style>
</head>
<body>
  <header>
    <h1>Explorer</h1>
    <button id="themeToggle" class="theme-toggle">Light Mode</button>
  </header>

  <div class="container">
    <div class="left">
      <h3>Files</h3>
      <div class="filelist" id="allFileList">
      </div>
    </div>
    <div id="noteHolder" class="right">
      <div class="empty-state">Select a file to view its content</div>
    </div>
  </div>

  <script type="module" src="viewer.js"></script>
</body>
</html>
